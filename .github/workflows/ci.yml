name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: elder_tree
          POSTGRES_PASSWORD: elder_tree
          POSTGRES_DB: elder_tree
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U elder_tree -d elder_tree"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://elder_tree:elder_tree@localhost:5432/elder_tree
      RUN_PERSISTENCE_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm exec --workspace @elder-tree/api -- prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-verifier
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/ai-verifier/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug

  flutter-apple:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Verify macOS Firebase Keychain capability
        run: plutil -extract keychain-access-groups xml1 -o - macos/Runner/DebugProfile.entitlements
      - name: Patch Flutter Apple build compatibility
        run: bash tool/patch_maplibre_ios_spm.sh
      - name: Build macOS without a developer certificate
        run: |
          plutil -remove keychain-access-groups macos/Runner/DebugProfile.entitlements
          flutter build macos --debug
      - run: flutter build ios --simulator --no-codesign
