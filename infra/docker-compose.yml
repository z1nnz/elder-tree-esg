services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elder_tree
      POSTGRES_USER: elder_tree
      POSTGRES_PASSWORD: elder_tree
    ports:
      - "5432:5432"
    volumes:
      - elder_tree_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elder_tree"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  elder_tree_postgres:
